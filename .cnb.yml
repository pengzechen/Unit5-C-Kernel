# CNB pipeline configuration for Avatar OS Kernel learning repo

# ── Common Docker configuration ────────────────────────────────────────────────
.docker-config: &docker-config
  build:
    dockerfile: Dockerfile
    by: [Dockerfile]

# ── Push to main: build and test avatar-next ───────────────────────────────────
main:
  push:
    - name: build-and-test
      docker: *docker-config
      stages:
        - name: init-submodule
          script: git submodule update --init --recursive
        - name: build-aarch64
          script: cd avatar-next && make ARCH=aarch64 kernel
        - name: run-aarch64-qemu
          script: |
            cd avatar-next
            timeout 30 make ARCH=aarch64 run 2>&1 | tee /tmp/qemu_output.log || true
            if [ -s /tmp/qemu_output.log ]; then
              echo "✅ QEMU started and produced output"
              head -20 /tmp/qemu_output.log
            else
              echo "⚠️ No QEMU output detected"
            fi

# ── Pull request: build check ─────────────────────────────────────────────────
"**":
  pull_request:
    - name: pr-build-check
      docker: *docker-config
      stages:
        - name: init-submodule
          script: git submodule update --init --recursive
        - name: build-aarch64
          script: cd avatar-next && make ARCH=aarch64 kernel

# ── Cloud native development ───────────────────────────────────────────────────
$:
  vscode:
    - name: cloud-dev
      docker: *docker-config
      services:
        - vscode
      stages:
        - name: init-submodule
          script: git submodule update --init --recursive
        - name: vscode-go
          type: vscode:go
